<!DOCTYPE html>
<html>
<head>
<title>Login - Smart Queue AI</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-blue-100 to-indigo-200 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-2xl rounded-2xl p-10 w-96">
<h2 class="text-3xl font-bold text-center text-blue-600 mb-6">
Smart Queue AI
</h2>

<form method="POST">
<input type="email" name="email" placeholder="Email"
class="w-full mb-4 px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-400" required>

<input type="password" name="password" placeholder="Password"
class="w-full mb-6 px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-400" required>

<button class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700">
Login
</button>
</form>

<p class="text-center mt-5">
Don't have account?
<a href="/register" class="text-blue-600 font-semibold">Register</a>
</p>

<p class="text-center mt-4">
<a href="/" class="text-blue-600 font-semibold hover:underline">Back to Home</a>
</p>
</div>

</body>
</html>
