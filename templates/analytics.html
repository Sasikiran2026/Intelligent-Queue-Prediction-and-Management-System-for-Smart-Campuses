<!DOCTYPE html>
<html>
<head>
<title>Analytics</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gray-100">

<nav class="bg-white shadow-md">
<div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
<h1 class="text-2xl font-bold text-blue-600">Analytics Dashboard</h1>
<div class="space-x-3">
<a href="/dashboard" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700">Student Dashboard</a>
<a href="/admin" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">Back</a>
</div>
</div>
</nav>

<div class="max-w-6xl mx-auto py-10 px-6">

<!-- Today's Stats -->
<div class="bg-white p-8 rounded-xl shadow mb-8">
<h2 class="text-2xl font-bold text-gray-800 mb-6">📊 Today's Statistics</h2>
<div class="grid grid-cols-3 gap-6 mb-6">
<div class="text-center">
<div class="text-4xl font-bold text-blue-600">{{ total }}</div>
<div class="text-gray-600">Total Today</div>
</div>
<div class="text-center">
<div class="text-4xl font-bold text-yellow-600">{{ waiting }}</div>
<div class="text-gray-600">Waiting Today</div>
</div>
<div class="text-center">
<div class="text-4xl font-bold text-green-600">{{ served }}</div>
<div class="text-gray-600">Served Today</div>
</div>
</div>
<canvas id="todayChart"></canvas>
</div>

<!-- All-Time Stats -->
<div class="bg-white p-8 rounded-xl shadow">
<h2 class="text-2xl font-bold text-gray-800 mb-6">📈 All-Time Statistics</h2>
<div class="grid grid-cols-3 gap-6 mb-6">
<div class="text-center">
<div class="text-4xl font-bold text-purple-600">{{ total_all }}</div>
<div class="text-gray-600">Total All-Time</div>
</div>
<div class="text-center">
<div class="text-4xl font-bold text-orange-600">{{ archived_count }}</div>
<div class="text-gray-600">Archived Records</div>
</div>
<div class="text-center">
<div class="text-4xl font-bold text-indigo-600">{{ total_all - archived_count }}</div>
<div class="text-gray-600">Active Records</div>
</div>
</div>
<canvas id="allTimeChart"></canvas>
</div>

</div>

<script>
const total = {{ total | default(0) }};
const waiting = {{ waiting | default(0) }};
const served = {{ served | default(0) }};
const totalAll = {{ total_all | default(0) }};
const archived = {{ archived_count | default(0) }};
const active = totalAll - archived;

// Today's Chart
const todayCtx = document.getElementById('todayChart');
new Chart(todayCtx, {
type: 'bar',
data: {
labels: ['Total Today', 'Waiting Today', 'Served Today'],
datasets: [{
label: 'Today\'s Queue Stats',
data: [total, waiting, served],
backgroundColor: ['#3b82f6','#f59e0b','#10b981']
}]
},
options: {
scales: {
y: {
beginAtZero: true
}
}
}
});

// All-Time Chart
const allTimeCtx = document.getElementById('allTimeChart');
new Chart(allTimeCtx, {
type: 'doughnut',
data: {
labels: ['Active Records', 'Archived Records'],
datasets: [{
label: 'All-Time Distribution',
data: [active, archived],
backgroundColor: ['#6366f1','#f59e0b']
}]
}
});
</script>

</body>
</html>
