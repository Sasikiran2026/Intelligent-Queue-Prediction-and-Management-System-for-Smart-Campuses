<!DOCTYPE html>
<html>
<head>
<title>Register</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-indigo-100 to-blue-200 min-h-screen flex items-center justify-center">

<div class="bg-white p-10 rounded-2xl shadow-2xl w-96">
<h2 class="text-3xl font-bold text-center text-indigo-600 mb-6">
Create Account
</h2>

{% if error %}
<div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg mb-4">
{{ error }}
</div>
{% endif %}

<form method="POST">
<input type="text" name="name" placeholder="Full Name"
class="w-full mb-4 px-4 py-3 border rounded-lg focus:ring-2 focus:ring-indigo-400" required>

<input type="email" name="email" placeholder="Email"
class="w-full mb-4 px-4 py-3 border rounded-lg focus:ring-2 focus:ring-indigo-400" required>

<input type="tel" name="phone" placeholder="Phone Number"
class="w-full mb-4 px-4 py-3 border rounded-lg focus:ring-2 focus:ring-indigo-400" required>

<select name="role" class="w-full mb-4 px-4 py-3 border rounded-lg focus:ring-2 focus:ring-indigo-400" required>
<option value="">Select Role</option>
<option value="student">Student</option>
<option value="admin">Admin</option>
</select>

<input type="password" name="password" placeholder="Password"
class="w-full mb-4 px-4 py-3 border rounded-lg focus:ring-2 focus:ring-indigo-400" required>

<input type="password" name="confirm_password" placeholder="Confirm Password"
class="w-full mb-6 px-4 py-3 border rounded-lg focus:ring-2 focus:ring-indigo-400" required>

<button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700 font-semibold">
Register
</button>
</form>

<p class="text-center mt-5">
Already have account?
<a href="/login" class="text-indigo-600 font-semibold">Login</a>
</p>

<p class="text-center mt-4">
<a href="/" class="text-indigo-600 font-semibold hover:underline">Back to Home</a>
</p>
</div>

</body>
</html>
